status: not_run
evidence_label: reference_trend
normalization_target:
  topology: mesh
  dimensions:
    rows: 4
    cols: 4
  packet_size_bits: 128
  link_width_bits_per_cycle: 128
  routing: XY
  arbitration: deterministic_round_robin_or_nearest_available_equivalent
