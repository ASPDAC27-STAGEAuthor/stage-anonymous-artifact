    stop: saturation
    step: TBD
metrics:
  - average_latency
  - throughput
  - saturation_injection_rate
  - queueing_delay
  - congestion_trend
outputs:
  raw_dir: experiments/aspdac/results/booksim/booksim_4x4_mesh_reference/raw
  processed_metrics: experiments/aspdac/results/booksim/booksim_4x4_mesh_reference/metrics.csv
  manifest: experiments/aspdac/results/booksim/booksim_4x4_mesh_reference/manifest.json
notes:
  - Use trend wording until all microarchitectural assumptions are normalized.
  - Generated results are external reference data, not VHaCSim measurements.
